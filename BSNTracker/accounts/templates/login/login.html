{% extends "base.html" %} 
{% block title %}Login{% endblock %}

{% block content %}
{% load static %}
<style>
    body{
        background-image: url("/static/images/loginBackground.jpg");
    }
</style>


<div class="form-box">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="form-submit">Login</button>
    </form>
</div>

{% endblock %}
