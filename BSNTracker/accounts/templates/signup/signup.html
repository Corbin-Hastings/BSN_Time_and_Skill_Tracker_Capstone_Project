{% extends "base.html" %} 
{% block title %}Sign Up{% endblock %}

{% block content %}

{% load static %}
<style>
    body{
        background-image: url("/static/images/loginBackground.jpg");
    }
</style>

<div class="form-box">
    <h2>Create an Account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="form-submit">Sign Up</button>
    </form>
</div>
{% endblock %}
