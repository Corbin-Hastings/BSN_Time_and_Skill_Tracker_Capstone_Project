{% extends "base.html" %} 
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="form-box">
    <h2>Create an Account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="form-submit">Sign Up</button>
    </form>
</div>
{% endblock %}
