{% extends "base.html" %}

{% block title %}Time Entry{% endblock %}

{% block content %}


<div class="table-box">

            <table>
                <caption>Skills</caption>
                <tr>
            <th>Skill</th>
            <th>Date</th>
            <th>Level</th>
            <th>Approve</th>
        {% for skill in skills %}
        </tr>
                <tr>
            <td>{{ skill.skill }}</td>
            <td>{{ skill.completed }}</td>
            <td>{{ skill.sai }}</td>
            <td>{% if skill.approved %}Approved!{% else %}Pending{% endif %}</td>

        </tr>
                {% endfor %}
            </table>


</div>
{% endblock %}
