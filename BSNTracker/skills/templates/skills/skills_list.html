{% extends "base.html" %}

{% block title %}Time Entry{% endblock %}

{% block content %}


<div class="table-box">

            <table>
                <caption>Skills</caption>
                <tr>
                    <th>Skill</th>
                    <th>Date</th>
                    <th>Level</th>
                    <th>Approve</th>
                </tr>

                {% for skill in skills %}
                <tr>
                    <td>{{ skill.skill }}</td>
                    <td>{{ skill.date }}</td>
                    <td>{{ skill.level }}</td>
                    <td>{% if skill.approved %}Approved!{% else %}Pending{% endif %}</td>
                </tr>
                {% endfor %}

            </table>


</div>
{% endblock %}
