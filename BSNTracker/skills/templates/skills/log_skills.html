{% extends "base.html" %}

{% block title %}Log Skills{% endblock %}

{% block content %}

<div class="form-box">
    <h2>Log Skills</h2>

    <form class="form-with-validation" action="{% url 'skills:log-skills' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="form-submit">Log Skill</button>
    </form>
</div>

{% endblock %}
