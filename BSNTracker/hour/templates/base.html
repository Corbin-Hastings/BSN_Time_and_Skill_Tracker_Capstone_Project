<!DOCTYPE html>
<html>

<head>
  <title>{% block title %}WCUNursingLog{% endblock %}</title>
  {% load django_bootstrap5 %}
  {% bootstrap_css %}
  {% bootstrap_javascript %}
</head>

    <style>
        .topnav {
            background-color: #333;
            overflow: hidden;
        }


        .topnav a {
          float: left;
          color: #f2f2f2;
          text-align: center;
          padding: 14px 16px;
          text-decoration: none;
          font-size: 17px;
        }


        .topnav a:hover {
          background-color: #ddd;
          color: black;
        }


        .topnav a.active {
          background-color: #04AA6D;
          color: white;
        }
        .my-box {
            border: 2px solid black;
            padding: 20px;
            margin: 50px;
            background-color: lightred;
            width: 300px;
            text-align: center;
            font-size: 30px;
            color: black;
        }

    </style>




<body>

    <div class="topnav">
        <a href="#currentskills">Current Skills</a>
        <a href="#currenthours">Current Hours</a>
        <a href="#logskills">Log Skills</a>
        <a href="#loghours">Log Hours</a>
    </div>
    {% block content %}
    {% endblock content %}





</body>
</html>
